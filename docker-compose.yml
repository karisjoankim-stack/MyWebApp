version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - /app/runs
    environment:
      - PORT=3002

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5180:5180"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
